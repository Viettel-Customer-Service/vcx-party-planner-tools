birthday:
  async:
    core-pool-size: ${BIRTHDAY_ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${BIRTHDAY_ASYNC_MAX_POOL_SIZE:8}
    queue-capacity: ${BIRTHDAY_ASYNC_QUEUE_CAPACITY:50}
    thread-name-prefix: ${BIRTHDAY_ASYNC_THREAD_NAME_PREFIX:BdayWorker-}

  gemini:
    retry:
      max-attempts: ${BIRTHDAY_GEMINI_RETRY_MAX_ATTEMPTS:2}
      backoff-ms: ${BIRTHDAY_GEMINI_RETRY_BACKOFF_MS:2000}

  scheduler:
    # TODO: Set message template id to use for scheduled birthday sends.
    message-template-id: 1

  notification:
    whatsapp:
      enabled: ${WHATSAPP_ENABLED:true}
      group-id: ${WHATSAPP_GROUP_ID:120363407565980215@g.us}
    email:
      enabled: ${EMAIL_ENABLED:false}
      subject: ${EMAIL_SUBJECT:Chuc mung sinh nhat}
