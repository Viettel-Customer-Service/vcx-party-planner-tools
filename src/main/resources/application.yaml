spring:
  application:
    name: birthday-notification

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    # nếu muốn dùng file ngoài thì comment dòng trên và dùng dòng dưới
    # prefix: file:src/main/resources/templates/

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

  web:
    resources:
      static-locations: classpath:/static/,file:src/main/resources/static/
      chain:
        cache: false

  # DEVTOOLS (AUTO RELOAD)
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources
    livereload:
      enabled: true

  # MAIL (Outlook SMTP by default - override via environment variables)
#  For Gmail/Outlook. use App Password.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:hieuhieu1234231@gmail.com}
#    password: ${MAIL_PASSWORD:qinghncrqarhynrl}
    password: qinghncrqarhynrl
    default-encoding: UTF-8
    properties:
      mail:
        debug: ${MAIL_DEBUG:true}
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

