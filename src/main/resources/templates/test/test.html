<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout :: layout(pageTitle='Test Gửi Lời Chúc', activeMenu='test', content=~{::content}, pageStyles=~{test/assets :: pageStyles}, pageScripts=~{test/assets :: pageScripts})}">
<div th:fragment="content">
    <div class="employee-page">
        <div class="card border-0 shadow-sm employee-card">
            <div class="card-body p-0">
                <!-- <div class="d-flex flex-wrap align-items-center justify-content-between employee-toolbar"> -->
                <!-- <div> -->
                <!-- <h2 class="h5 mb-1 text-dark">Test Gửi Lời Chúc Sinh Nhật</h2> -->
                <!-- <p class="text-muted mb-0">Dữ liệu lấy từ Danh Sách Nhân Viên, thao tác gửi từng người để kiểm
                            thử.</p> -->
                <!-- </div> -->
                <!-- </div> -->

                <div class="employee-toast-container" th:if="${successMessage != null or errorMessage != null}">
                    <div class="toast employee-toast js-page-toast" role="alert" aria-live="assertive"
                        aria-atomic="true" th:classappend="${errorMessage != null} ? ' toast-error' : ' toast-success'"
                        th:attr="data-toast-delay=3500">
                        <div class="toast-header">
                            <strong class="mr-auto" th:text="${errorMessage != null ? 'Có lỗi' : 'Thành công'}">Thông
                                báo</strong>
                            <small class="text-muted">vừa xong</small>
                            <button type="button" class="ml-2 mb-1 close js-toast-close" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="toast-body" th:text="${errorMessage != null ? errorMessage : successMessage}">Thông
                            báo</div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 employee-table">
                        <thead>
                            <tr>
                                <th>Mã NV</th>
                                <th>Họ và tên</th>
                                <th>Ngày sinh</th>
                                <th>Số điện thoại</th>
                                <th>Email</th>
                                <th>Chức danh & Phòng ban</th>
                                <th class="text-center">*</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="employee : ${employees}">
                                <td>
                                    <code style="font-size:0.85rem; font-weight:600; color:#4a5578; background:#f0f2f8; padding:3px 8px; border-radius:6px; letter-spacing:0.02em;" th:text="${employee.employeeCode}">EMP001</code>
                                </td>
                                <td>
                                    <div class="emp-name" th:text="${employee.fullName}" style="font-weight:600; color:#2c3345;">Nguyễn Văn A</div>
                                </td>
                                <td>
                                    <div class="dob-cell" style="display:inline-flex; align-items:center; gap:6px;">
                                        <i class="bi bi-calendar3 text-muted" style="font-size:0.8rem;" aria-hidden="true" th:if="${employee.dateOfBirth != null}"></i>
                                        <span th:text="${employee.dateOfBirth != null ? #temporals.format(employee.dateOfBirth, 'dd/MM/yyyy') : '—'}">15/01/1996</span>
                                    </div>
                                </td>
                                <td th:text="${employee.phone ?: '—'}">0901234567</td>
                                <td th:text="${employee.email ?: '—'}" style="color:#5a6376;">abc@company.vn</td>
                                <td>
                                    <div class="d-flex flex-column" style="gap:4px;">
                                        <span style="font-size:0.85rem; font-weight:500; color:#3b4356;" th:text="${employee.title}">Lập trình viên</span>
                                        <div><span class="dept-badge" th:text="${employee.department}">CNTT</span></div>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/test/send/{employeeId}(employeeId=${employee.employeeId})}"
                                        method="post" class="d-inline">
                                        <input type="hidden" name="page"
                                            th:value="${pagination != null ? pagination.currentPage : 0}">
                                        <input type="hidden" name="size"
                                            th:value="${pagination != null ? pagination.size : 20}">
                                        <button type="submit" class="btn btn-sm btn-primary js-send-birthday"
                                            th:attr="data-employee-name=${employee.fullName}">Gửi</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(employees)}">
                                <td colspan="7" class="text-center text-muted py-4">Không có dữ liệu Nhân viên.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:replace="~{common/pagination :: pager(pagination=${pagination}, baseUrl=${baseUrl})}"></div>
            </div>
        </div>
    </div>
</div>

</html>
