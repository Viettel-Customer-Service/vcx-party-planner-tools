<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/auth-layout :: layout(pageTitle='Login', content=~{::content})}">
<div th:fragment="content">
    <div class="card auth-card glassmorphism-card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4 pb-2">
                <h4 class="auth-title fw-bold text-dark">Chào mừng trở lại!</h4>
                <p class="auth-subtitle text-muted mb-0">Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <div class="alert alert-danger auth-alert d-flex align-items-center mb-4" th:if="${loginError}">
                <i class="bi bi-exclamation-triangle-fill me-3 fs-5"></i>
                <div class="fw-medium">Tên đăng nhập hoặc mật khẩu không chính xác.</div>
            </div>
            <div class="alert alert-success auth-alert d-flex align-items-center mb-4" th:if="${loggedOut}">
                <i class="bi bi-check-circle-fill me-3 fs-5"></i>
                <div class="fw-medium">Bạn đã đăng xuất an toàn.</div>
            </div>

            <form class="auth-form" th:action="@{/login}" method="post">
                <div class="form-group mb-4 position-relative">
                    <label class="form-label fw-semibold text-secondary" for="username">Tên đăng nhập</label>
                    <div class="input-group input-group-merge auth-input-group shadow-sm">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-right-0" id="usernameIcon">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                        </div>
                        <input id="username"
                               name="username"
                               type="text"
                               class="form-control bg-transparent border-left-0 pl-0"
                               placeholder="VD: admin"
                               aria-describedby="usernameIcon"
                               autocomplete="username"
                               required>
                    </div>
                </div>

                <div class="form-group mb-4 position-relative">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label fw-semibold text-secondary mb-0" for="password">Mật khẩu</label>
                    </div>
                    <div class="input-group input-group-merge auth-input-group shadow-sm">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-right-0" id="pwdIcon">
                                <i class="bi bi-shield-lock text-muted"></i>
                            </span>
                        </div>
                        <input id="password"
                               name="password"
                               type="password"
                               class="form-control bg-transparent border-left-0 pl-0"
                               placeholder="Bảo mật bằng mật khẩu của bạn"
                               aria-describedby="pwdIcon"
                               autocomplete="current-password"
                               required>
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary border-left-0 border bg-transparent text-muted toggle-pwd" type="button" onclick="const pwd = document.getElementById('password'); const icon = this.querySelector('i'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.replace('bi-eye-slash', 'bi-eye'); } else { pwd.type = 'password'; icon.classList.replace('bi-eye', 'bi-eye-slash'); }">
                                <i class="bi bi-eye-slash cursor-pointer"></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="custom-control custom-checkbox mb-4 mt-2 custom-check">
                    <input type="checkbox" class="custom-control-input shadow-none" id="rememberMe">
                    <label class="custom-control-label text-muted fw-medium" for="rememberMe">Ghi nhớ đăng nhập</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block auth-submit-btn position-relative overflow-hidden shadow mt-4">
                    <span class="d-flex align-items-center justify-content-center w-100 position-relative" style="z-index: 1;">
                        Đăng nhập <i class="bi bi-arrow-right-short ms-2 fs-4 ml-1"></i>
                    </span>
                    <div class="btn-ripple"></div>
                </button>
            </form>
        </div>
    </div>
</div>
</html>
