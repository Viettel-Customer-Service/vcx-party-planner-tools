services:
  db:
    image: postgres:16-alpine
    container_name: birthday-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-birthday_notification}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Bind mount for database initialization script on first run:
#      - ./Info/Database/Script.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-birthday_notification}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: birthday-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/postgres
#      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/birthday_notification
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      # Optional external config:
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      # MAIL_HOST: ${MAIL_HOST}
      # MAIL_PORT: ${MAIL_PORT}
      # MAIL_USERNAME: ${MAIL_USERNAME}
      # MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8081:8080"
    volumes:
      # Bind mount for source code (development)
      - ./src:/app/src:ro
      # Bind mount for static files
      - ./src/main/resources/static:/app/src/main/resources/static:ro
      # Bind mount for templates
      - ./src/main/resources/templates:/app/src/main/resources/templates:ro

volumes:
  pgdata:
